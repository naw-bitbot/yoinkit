name: Build Yoinkit

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build wget binary
        run: |
          brew install wget
          WGET_PATH=$(which wget)
          mkdir -p apps/desktop/src-tauri/bin
          cp "$WGET_PATH" apps/desktop/src-tauri/bin/wget
          chmod +x apps/desktop/src-tauri/bin/wget

      - name: Install Tauri CLI
        run: pnpm add -Dw @tauri-apps/cli

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TARGET: ${{ matrix.target }}
        run: |
          cd apps/desktop
          pnpm tauri build --target "$TARGET"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yoinkit-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

  create-release:
    needs: build-macos
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: yoinkit-aarch64-apple-darwin
          path: artifacts/arm64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: yoinkit-x86_64-apple-darwin
          path: artifacts/x86_64

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/arm64/**/*.dmg
            artifacts/x86_64/**/*.dmg
          generate_release_notes: true
          draft: false
